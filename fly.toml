app = "cafe-orders"
primary_region = "ams"

[build]

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/cafe.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "cafe_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
